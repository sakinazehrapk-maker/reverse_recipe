<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>reverse recipe generator</title>
        <link rel="stylesheet"href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>reverse recipe generator</h1>
            <p>enter ingredients and discover whatve youve created</p>
            <div class="fog"></div>
            <div class="fog fog2"></div>
            <div class="cauldron">
                <div class="pot"></div>
                <div class="bubbles">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="smoke">
                    <span></span>
                    <span></span>
                    <span></span>
                    </div>
            </div>
            
            <textarea
            id="ingredients"
            placeholder="milk,banana,ketchup..."></textarea>
            <button onclick="generateResult()">
                find out what youve created
            </button>
            <div id="result"></div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
